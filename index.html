<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080807" />
  <title>arthouse — pixels. patterns. paradoxes.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Playfair+Display:ital,wght@0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:#080807;--bg2:#0f0f0d;--line:rgba(255,255,255,0.08);
      --white:#f0ece2;--dim:rgba(240,236,226,0.92);--faint:rgba(240,236,226,0.70);
      --gold:#d4a843;--amber:#e8891a;--green:#4ade80;
      --mono:'IBM Plex Mono', monospace;--serif:'Playfair Display', serif;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--white);font-family:var(--mono);overflow-x:hidden}

    body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9000}

    #overlay{
      position:fixed;inset:0;background:#000;z-index:9999;
      display:flex;align-items:center;justify-content:center;
      color:#fff;font-size:14px;letter-spacing:.2em;text-transform:uppercase;
      transition:opacity .8s ease;
    }

    #overlay.hidden{opacity:0;pointer-events:none}

    #hero{min-height:100svh;padding:80px 24px 60px;display:flex;flex-direction:column;justify-content:center}

    .hero-prompt{font-size:12px;letter-spacing:.12em;color:var(--gold);margin-bottom:32px}
    .cursor-blink{display:inline-block;width:8px;height:14px;background:var(--green);animation:blink 1s step-end infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

    .hero-title{font-family:var(--serif);font-weight:900;font-style:italic;font-size:clamp(70px,22vw,180px)}
    .gold{color:var(--gold)}

  </style>
</head>
<body>

<div id="overlay">you weren't supposed to be here</div>

<section id="hero">
  <p class="hero-prompt">
    <span id="typed-text"></span><span class="cursor-blink"></span>
  </p>
  <h1 class="hero-title">art<span class="gold">house</span></h1>
</section>

<script>

// ===== MEMORY SYSTEM =====
const firstVisit = localStorage.getItem("arthouse_first");
const lastVisit = localStorage.getItem("arthouse_last");

if(!firstVisit){
  localStorage.setItem("arthouse_first", Date.now());
}

localStorage.setItem("arthouse_last", Date.now());

// ===== OVERLAY SEQUENCE =====
const overlay = document.getElementById("overlay");

setTimeout(()=>{
  overlay.innerText = "...but now that you're here";
},2000);

setTimeout(()=>{
  overlay.classList.add("hidden");
},4000);

// ===== DYNAMIC TEXT =====
const target = document.getElementById('typed-text');

let phrase;

if(!lastVisit){
  phrase = "initializing unknown presence...";
}else{
  const diff = Date.now() - lastVisit;
  if(diff < 60000){
    phrase = "you returned too quickly...";
  }else if(diff < 3600000){
    phrase = "you came back...";
  }else{
    phrase = "it's been a while...";
  }
}

let i = 0;
function type(){
  target.textContent = phrase.slice(0,i);
  if(i++ <= phrase.length){
    setTimeout(type, 40 + Math.random()*80);
  }
}

setTimeout(type, 4500);

// ===== RANDOM WHISPER =====
setTimeout(()=>{
  if(Math.random() > 0.6){
    const whisper = document.createElement("div");
    whisper.style.position="fixed";
    whisper.style.bottom="20px";
    whisper.style.left="20px";
    whisper.style.fontSize="10px";
    whisper.style.opacity="0.5";
    whisper.innerText="i'm still watching";
    document.body.appendChild(whisper);
  }
},8000);

</script>

</body>
</html>
