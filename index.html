<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arthouse</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#080807;
  color:#f0ece2;
  font-family:'IBM Plex Mono', monospace;
  overflow:hidden;
}

/* overlay intro */
#overlay{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  letter-spacing:.2em;
  text-transform:uppercase;
  z-index:9999;
  transition:opacity .8s ease;
}
#overlay.hidden{
  opacity:0;
  pointer-events:none;
}

/* hero */
#hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:flex-start;
  padding:40px;
}

.hero-text{
  color:#d4a843;
  font-size:12px;
  margin-bottom:20px;
}

.hero-title{
  font-family:'Playfair Display', serif;
  font-style:italic;
  font-weight:900;
  font-size:clamp(60px,20vw,140px);
}

.gold{color:#d4a843}

.cursor{
  display:inline-block;
  width:8px;
  height:14px;
  background:#4ade80;
  margin-left:4px;
  animation:blink 1s infinite;
}
@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:0}
}

/* whisper */
.whisper{
  position:fixed;
  bottom:20px;
  left:20px;
  font-size:10px;
  opacity:.4;
}

</style>
</head>

<body>

<div id="overlay">you weren't supposed to be here</div>

<section id="hero">
  <div class="hero-text">
    <span id="typed"></span><span class="cursor"></span>
  </div>
  <div class="hero-title">
    art<span class="gold">house</span>
  </div>
</section>

<script>

// ===== MEMORY =====
const firstVisit = localStorage.getItem("arthouse_first");
const lastVisit = localStorage.getItem("arthouse_last");

if(!firstVisit){
  localStorage.setItem("arthouse_first", Date.now());
}

localStorage.setItem("arthouse_last", Date.now());

// ===== OVERLAY FLOW (SAFE) =====
const overlay = document.getElementById("overlay");

setTimeout(()=>{
  overlay.innerText = "...but now that you're here";
},1200);

setTimeout(()=>{
  overlay.classList.add("hidden");
},2200);

// ===== DYNAMIC TEXT =====
const el = document.getElementById("typed");

let phrase = "arthouse_init.exe";

if(lastVisit){
  const diff = Date.now() - lastVisit;

  if(diff < 60000){
    phrase = "you returned too quickly...";
  }else if(diff < 3600000){
    phrase = "you came back...";
  }else{
    phrase = "it's been a while...";
  }
}

// ===== TYPEWRITER (SMOOTH) =====
let i = 0;
function type(){
  el.textContent = phrase.slice(0,i);
  if(i++ <= phrase.length){
    setTimeout(type, 35);
  }
}

setTimeout(type, 2400);

// ===== RANDOM WHISPER =====
setTimeout(()=>{
  if(Math.random() > 0.6){
    const w = document.createElement("div");
    w.className = "whisper";
    w.innerText = "i'm still watching";
    document.body.appendChild(w);
  }
},5000);

</script>

</body>
</html>
